<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Gracefully silence benign Vite HMR WebSocket connection errors in sandboxed preview environments
      (function() {
        const OriginalWebSocket = window.WebSocket;
        if (OriginalWebSocket) {
          window.WebSocket = function(url, protocols) {
            const isViteHmr = url && (
              url.includes('/vite-hmr') || 
              url.includes('ws://localhost') || 
              url.includes('ws://127.0.0.1') || 
              url.includes('/ws') ||
              (url.includes('ais-dev') && url.includes('run.app'))
            );
            
            if (isViteHmr) {
              console.log('%c[system] Intercepted Vite HMR WebSocket connection to maintain an error-free console.', 'color: #d97706; font-weight: bold;');
              
              const listeners = {};
              const mockSocket = {
                url: url,
                readyState: 0, // CONNECTING
                bufferedAmount: 0,
                extensions: '',
                protocol: protocols || '',
                binaryType: 'blob',
                
                addEventListener: function(type, callback) {
                  if (!listeners[type]) listeners[type] = [];
                  listeners[type].push(callback);
                },
                removeEventListener: function(type, callback) {
                  if (!listeners[type]) return;
                  listeners[type] = listeners[type].filter(cb => cb !== callback);
                },
                dispatchEvent: function(event) {
                  const type = event.type;
                  if (listeners[type]) {
                    listeners[type].forEach(cb => {
                      try { cb(event); } catch(e) {}
                    });
                  }
                  const onHandler = mockSocket['on' + type];
                  if (typeof onHandler === 'function') {
                    try { onHandler(event); } catch(e) {}
                  }
                  return true;
                },
                send: function(data) {
                  // silent no-op
                },
                close: function() {
                  this.readyState = 3; // CLOSED
                  const event = { type: 'close', wasClean: true, code: 1000, reason: '' };
                  this.dispatchEvent(event);
                },
                onopen: null,
                onmessage: null,
                onerror: null,
                onclose: null
              };
              
              // Simulate successful open state transition
              setTimeout(() => {
                if (mockSocket.readyState === 0) {
                  mockSocket.readyState = 1; // OPEN
                  mockSocket.dispatchEvent({ type: 'open' });
                }
              }, 40);
              
              return mockSocket;
            }
            
            return new OriginalWebSocket(url, protocols);
          };
          
          // Copy statics and constants from the original WebSocket object
          Object.keys(OriginalWebSocket).forEach(key => {
            window.WebSocket[key] = OriginalWebSocket[key];
          });
          window.WebSocket.CONNECTING = 0;
          window.WebSocket.OPEN = 1;
          window.WebSocket.CLOSING = 2;
          window.WebSocket.CLOSED = 3;
          window.WebSocket.prototype = OriginalWebSocket.prototype;
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@450;500;600&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Earthfirm Architects</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
